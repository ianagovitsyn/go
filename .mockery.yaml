with-expecter: true
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceNameSnake}}.go"
outpkg: "mocks"
mockname: "{{.InterfaceName}}"
resolve-type-alias: False
issue-845-fix: True

packages:
  github.com/ianagovitsyn/project/order/internal/service:
    config:
      include-regex: ".*Service"

  github.com/ianagovitsyn/project/order/internal/repository:
    config:
      include-regex: ".*Repository"

  github.com/ianagovitsyn/project/order/internal/client/grpc:
    config:
      include-regex: ".*Client"