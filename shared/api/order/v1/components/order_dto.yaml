type: object
required:
  - order_uuid
  - user_uuid
  - part_uuids
  - total_price
  - status
properties:
  order_uuid:
    type: string
    format: uuid
    description: Уникальный идентификатор заказа
  user_uuid:
    type: string
    format: uuid
    description: UUID пользователя
  part_uuids:
    type: array
    items:
      type: string
      format: uuid
    description: Список UUID деталей
  total_price:
    type: number
    format: double
    description: Итоговая стоимость
  transaction_uuid:
    type: string
    format: uuid
    description: UUID транзакции (если оплачен)
  payment_method:
    $ref: ./enums/payment_method.yaml
  status:
    $ref: ./enums/order_status.yaml