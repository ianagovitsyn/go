syntax = "proto3";

// Package inventory.v1 отвечает за хранение и предоставление информации о деталях для сборки космических кораблей.
package inventory.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ianagovitsyn/project/shared/pkg/proto/inventory/v1;inventory_v1";

// InventoryService предоставляет API для хранения и предоставлении информации о деталях для сборки космических кораблей
service InventoryService {
  // GetPart возвращает информацию о детали по её UUID.
  rpc GetPart(GetPartRequest) returns (GetPartResponse);

  // ListParts возвращает список деталей с возможностью фильтрации.
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

// Part информация о детали для сборки космического корабля
message Part {
  // uuid уникальный идентификатор детали
  string uuid = 1;

  // name название детали
  string name = 2;

  // description описание детали
  string description = 3;

  // price цена за единицу
  double price = 4;

  // stock_quantity количество на складе
  int64 stock_quantity = 5;

  // category категория
  Category category = 6;

  // dimensions размеры детали
  Dimensions dimensions = 7;

  // manufacturer информация о производителе
  Manufacturer manufacturer = 8;

  // tags теги быстрого поиска
  repeated string tags = 9;

  // metadata гибкие метаданные
  map<string, Value> metadata = 10;

  // created_at дата создания
  google.protobuf.Timestamp created_at = 11;

  // updated_at дата обновления
  google.protobuf.Timestamp updated_at = 12;
}

// Category категория детали
enum Category {
  // UNKNOWN неизвестная категория
  UNKNOWN = 0;

  // ENGINE двигатель
  ENGINE = 1;

  // FUEL топливо
  FUEL = 2;

  // PORTHOLE иллюминатор
  PORTHOLE = 3;

  // WING крыло
  WING = 4;
}

// Dimensions размеры детали
message Dimensions {
  // length длина в см
  double length = 1;

  // width ширина в см
  double width = 2;

  // height высота в см
  double height = 3;

  // weight вес в кг
  double weight = 4;
}

// Manufacturer информация о производителе детали
message Manufacturer {
  // name название
  string name = 1;

  // country страна производства
  string country = 2;

  // website сайт производства
  string website = 3;
}

// Value значение метаданных, может быть одним из нескольких типов
message Value {
  oneof kind {
    // string_value строковое значение
    string string_value = 1;

    // int64_value целое значение
    int64 int64_value = 2;

    // double_value дробное значение
    double double_value = 3;

    // bool_value логическое значение
    bool bool_value = 4;
  }
}

// GetPartRequest запрос на получение детали по UUID
message GetPartRequest {
  // uuid идентификатор детали
  string uuid = 1;
}

// GetPartResponse ответ с информацией о детали
message GetPartResponse {
  // part информация о детали
  Part part = 1;
}

// ListPartsRequest запрос на получение списка деталей
message ListPartsRequest {
  // filter Фильтр по деталям (все поля опциональны)
  PartsFilter filter = 1;
}

// PartsFilter фильтр для поиска деталей по различным критериям
message PartsFilter {
  // uuids список UUID'ов. Пусто — не фильтруем по UUID
  repeated string uuids = 1;

  // names список имён. Пусто — не фильтруем по имени
  repeated string names = 2;

  // categories список категорий. Пусто — не фильтруем по категории
  repeated Category categories = 3;

  // manufacturer_countries список стран производителей. Пусто — не фильтруем по стране
  repeated string manufacturer_countries = 4;

  // tags список тегов. Пусто — не фильтруем по тегам
  repeated string tags = 5;
}

// ListPartsResponse ответ со списком найденных деталей
message ListPartsResponse {
  // parts список найденных деталей
  repeated Part parts = 1;
}