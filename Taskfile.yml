version: '3'

# ============================================================================
# Taskfile для Windows (PowerShell)
# ============================================================================
# Требования:
#   - Windows 10/11
#   - PowerShell 5.1+ (есть в системе) или PowerShell 7+ (рекомендуется)
#   - Go 1.24+              -> winget install GoLang.Go
#   - Docker Desktop        -> winget install Docker.DockerDesktop
#   - Node.js + npm         -> winget install OpenJS.NodeJS.LTS
#   - Task                  -> scoop install task   ИЛИ   choco install go-task
#   - curl.exe есть в Win10 1803+ из коробки
#
# Запуск из PowerShell / Windows Terminal:
#   task <имя-задачи>
# ============================================================================

vars:
  GO_VERSION: '1.24'
  GOLANGCI_LINT_VERSION: 'v2.1.5'
  GCI_VERSION: 'v0.13.6'
  GOFUMPT_VERSION: 'v0.8.0'
  BUF_VERSION: '1.53.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.6'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.5.1'
  OGEN_VERSION: 'v1.12.0'
  YQ_VERSION: 'v4.45.2'
  MOCKERY_VERSION: 'v2.53.3'
  GRPCURL_VERSION: 'v1.9.3'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint.exe'
  GCI: '{{.BIN_DIR}}/gci.exe'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt.exe'
  BUF: '{{.BIN_DIR}}/buf.exe'
  OGEN: '{{.BIN_DIR}}/ogen.exe'
  YQ: '{{.BIN_DIR}}/yq.exe'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go.exe'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc.exe'
  MOCKERY: '{{.BIN_DIR}}/mockery.exe'
  GRPCURL: '{{.BIN_DIR}}/grpcurl.exe'

  NODE_MODULES_DIR: '{{.ROOT_DIR}}/node_modules/.bin'
  REDOCLY: '{{.NODE_MODULES_DIR}}/redocly.cmd'

  OPEN_API_ORDER_V1_BASE: '{{.ROOT_DIR}}/shared/api/order/v1/order.openapi.yaml'
  OPEN_API_ORDER_V1_BUNDLE: '{{.ROOT_DIR}}/shared/api/bundles/order.openapi.v1.bundle.yaml'

  OPEN_API_FILES: '{{.ROOT_DIR}}/shared/api/bundles'
  COVERAGE_DIR: '{{.ROOT_DIR}}/coverage'
  COVERAGE_FILE: total.out
  ORDER_MIGRATIONS_DIR: './order/migrations'
  POSTGRES_DSN: 'postgres://order-service-user:order-service-password@localhost:5432/order-service?sslmode=disable'

  MODULES: assembly inventory order payment platform iam notification

  # Префикс для запуска PowerShell-скриптов
  PS: 'powershell -NoProfile -ExecutionPolicy Bypass -Command'

tasks:

  # ==========================================================================
  # ФОРМАТТЕРЫ
  # ==========================================================================

  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt в ./bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.GOFUMPT}}')) {
          Write-Host '📦 Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        if (-not (Test-Path '{{.GCI}}')) {
          Write-Host '📦 Устанавливаем gci {{.GCI_VERSION}}...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/daixiang0/gci@{{.GCI_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "
    status:
      - powershell -NoProfile -Command "if ((Test-Path '{{.GOFUMPT}}') -and (Test-Path '{{.GCI}}')) { exit 0 } else { exit 1 }"

  format:
    desc: "Форматирует весь проект gofumpt + gci, исключая mocks"
    deps: [ install-formatters ]
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        $modules = '{{.MODULES}}' -split '\s+' | Where-Object { $_ }
        Write-Host '🧼 Форматируем через gofumpt ...'
        foreach ($mod in $modules) {
          if (Test-Path $mod) {
            Write-Host \"🧼 Форматируем $mod\"
            Get-ChildItem -Path $mod -Recurse -Filter '*.go' -File |
              Where-Object { $_.FullName -notmatch '[\\\\/]mocks[\\\\/]' } |
              ForEach-Object { & '{{.GOFUMPT}}' -extra -w $_.FullName }
          }
        }
        Write-Host '🎯 Сортируем импорты через gci ...'
        foreach ($mod in $modules) {
          if (Test-Path $mod) {
            Write-Host \"🎯 Сортируем импорты в $mod\"
            Get-ChildItem -Path $mod -Recurse -Filter '*.go' -File |
              Where-Object { $_.FullName -notmatch '[\\\\/]mocks[\\\\/]' } |
              ForEach-Object { & '{{.GCI}}' write -s standard -s default -s 'prefix(github.com/olezhek28/microservices-course-olezhek-solution)' $_.FullName }
          }
        }
        "

  # ==========================================================================
  # ЛИНТЕР
  # ==========================================================================

  install-golangci-lint:
    desc: "Устанавливает golangci-lint в каталог bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.GOLANGCI_LINT}}')) {
          Write-Host '📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "
    status:
      - powershell -NoProfile -Command "if (Test-Path '{{.GOLANGCI_LINT}}') { exit 0 } else { exit 1 }"

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    cmds:
      - |
        {{.PS}} "
        $modules = '{{.MODULES}}' -split '\s+' | Where-Object { $_ }
        $err = 0
        Write-Host '🔍 Линтим все модули ...'
        foreach ($mod in $modules) {
          if (Test-Path $mod) {
            Write-Host \"🔍 Линтим $mod module\"
            & '{{.GOLANGCI_LINT}}' run \"$mod/...\" --config=.golangci.yml
            if ($LASTEXITCODE -ne 0) { $err = 1 }
          }
        }
        exit $err
        "

  # ==========================================================================
  # PROTO
  # ==========================================================================

  install-buf:
    desc: "Устанавливает Buf в каталог bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BUF}}')) {
          if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
          Write-Host '📦 Скачиваем buf {{.BUF_VERSION}}...'
          $arch = if ([Environment]::Is64BitOperatingSystem) { 'x86_64' } else { 'i386' }
          $url = \"https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-Windows-$arch.exe\"
          Invoke-WebRequest -Uri $url -OutFile '{{.BUF}}' -UseBasicParsing
        }
        "
    status:
      - powershell -NoProfile -Command "if (Test-Path '{{.BUF}}') { exit 0 } else { exit 1 }"

  proto:install-plugins:
    desc: "Устанавливает protoc плагины в каталог bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.PROTOC_GEN_GO}}')) {
          Write-Host '📦 Installing protoc-gen-go...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        if (-not (Test-Path '{{.PROTOC_GEN_GO_GRPC}}')) {
          Write-Host '📦 Installing protoc-gen-go-grpc...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "

  proto:gen:
    deps: [ install-buf, proto:install-plugins, proto:lint ]
    desc: Генерация Go-кода из .proto
    dir: shared/proto
    cmds:
      - '{{.BUF}} generate'

  proto:lint:
    deps: [ install-buf, proto:install-plugins ]
    desc: Проверка .proto-файлов на соответствие стилю
    dir: shared/proto
    cmds:
      - '{{.BUF}} lint'

  # ==========================================================================
  # OPENAPI / OGEN / REDOCLY
  # ==========================================================================

  redocly-cli:install:
    desc: Установить локально Redocly CLI
    cmds:
      - |
        {{.PS}} "
        if (-not (Test-Path '{{.REDOCLY}}')) {
          Write-Host '📦 npm ci ...'
          npm ci
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "

  redocly-cli:order-v1-bundle:
    desc: Собрать OpenAPI в один файл через локальный redocly
    deps: [ redocly-cli:install ]
    cmds:
      - cmd: '{{.REDOCLY}} bundle {{.OPEN_API_ORDER_V1_BASE}} -o {{.OPEN_API_ORDER_V1_BUNDLE}}'

  redocly-cli:bundle:
    desc: Собрать все схемы OpenAPI в общие файлы через локальный redocly
    deps: [ redocly-cli:install ]
    cmds:
      - task: redocly-cli:order-v1-bundle

  ogen:install:
    desc: "Скачивает ogen в папку bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.OGEN}}')) {
          Write-Host '📦 Installing ogen {{.OGEN_VERSION}}...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "

  ogen:gen:
    desc: "Генерация Go-кода из всех OpenAPI-деклараций с x-ogen"
    deps: [ ogen:install, yq:install ]
    cmds:
      - task: redocly-cli:bundle
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        Get-ChildItem -Path '{{.OPEN_API_FILES}}' -Recurse -Include '*.yaml','*.yml' -File | ForEach-Object {
          $file = $_.FullName
          if (Select-String -Path $file -Pattern 'x-ogen:' -Quiet) {
            Write-Host \"🚀 Generating from: $file\"
            $target = & '{{.YQ}}' e '.\"x-ogen\".target' $file
            $package = & '{{.YQ}}' e '.\"x-ogen\".package' $file
            Write-Host \"📁 Target: $target\"
            Write-Host \"📦 Package: $package\"
            & '{{.OGEN}}' --target $target --package $package --clean $file
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
        }
        "

  gen:
    desc: "Генерация всех proto и OpenAPI деклараций"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  # ==========================================================================
  # ЗАВИСИМОСТИ / УТИЛИТЫ
  # ==========================================================================

  deps:update:
    desc: "Обновление зависимостей в go.mod во всех модулях"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        $modules = '{{.MODULES}}' -split '\s+' | Where-Object { $_ }
        Write-Host '🔄 Обновление зависимостей в go.mod во всех модулях'
        foreach ($mod in $modules) {
          if (Test-Path $mod) {
            Write-Host \"🔄 Обновление зависимостей в $mod\"
            Push-Location $mod
            try {
              go mod tidy -compat=1.24
              if ($LASTEXITCODE -ne 0) { exit 1 }
            } finally { Pop-Location }
          }
        }
        "

  yq:install:
    desc: "Устанавливает yq в bin/ при необходимости"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.YQ}}')) {
          Write-Host '📦 Installing yq...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/mikefarah/yq/v4@{{.YQ_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "

  mockery:install:
    desc: "Устанавливает mockery в ./bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.MOCKERY}}')) {
          Write-Host '📦 Installing mockery...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/vektra/mockery/v2@{{.MOCKERY_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "
    status:
      - powershell -NoProfile -Command "if (Test-Path '{{.MOCKERY}}') { exit 0 } else { exit 1 }"

  mockery:gen:
    desc: "Генерирует моки интерфейсов с помощью mockery"
    deps: [ mockery:install ]
    cmds:
      - cmd: '{{.MOCKERY}}'

  # ==========================================================================
  # ТЕСТЫ И ПОКРЫТИЕ
  # ==========================================================================

  test-coverage:
    desc: "Тесты с покрытием бизнес-логики (service/repository), отчёт по каждому модулю + общий"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Continue'
        $modules = '{{.MODULES}}' -split '\s+' | Where-Object { $_ }
        Write-Host '🧪 Запускаем расчёт покрытия...'
        if (Test-Path '{{.COVERAGE_DIR}}') { Remove-Item -Recurse -Force '{{.COVERAGE_DIR}}' }
        New-Item -ItemType Directory -Path '{{.COVERAGE_DIR}}' -Force | Out-Null

        $err = 0
        foreach ($mod in $modules) {
          Write-Host \"📦 Обрабатываем модуль: $mod\"
          $pkgs = (go list \"./$mod/...\") 2>$null |
            Where-Object { $_ -match '/(internal/(service|repository))' } |
            Where-Object { $_ -notmatch '/(mocks|testdata|pkg|api|proto|pb|cmd)' }
          if (-not $pkgs) {
            Write-Host \"⚠️  Нет подходящих пакетов в $mod\"
            continue
          }
          $coverPkgs = ($pkgs -join ',')
          $args = @('test', \"-coverpkg=$coverPkgs\", \"-coverprofile={{.COVERAGE_DIR}}/$mod.out\", '-covermode=atomic') + $pkgs
          & go @args
          if ($LASTEXITCODE -ne 0) { $err = 1 }
        }

        if ($err -ne 0) {
          Write-Host '❌ Ошибки во время тестов'
          exit $err
        }

        Write-Host ''
        Write-Host '📊 Покрытие по каждому модулю:'
        foreach ($mod in $modules) {
          $outfile = \"{{.COVERAGE_DIR}}/$mod.out\"
          if (Test-Path $outfile) {
            $line = (go tool cover -func=$outfile | Select-Object -Last 1)
            Write-Host \" • $mod`: $line\"
          }
        }

        Write-Host ''
        Write-Host '📦 Склеиваем все покрытия...'
        $total = '{{.COVERAGE_DIR}}/{{.COVERAGE_FILE}}'
        'mode: atomic' | Set-Content -Path $total -Encoding ASCII
        Get-ChildItem -Path '{{.COVERAGE_DIR}}' -Filter '*.out' -File |
          Where-Object { $_.Name -ne '{{.COVERAGE_FILE}}' } |
          ForEach-Object { Get-Content $_.FullName | Where-Object { $_ -notmatch '^mode:' } | Add-Content -Path $total }

        Write-Host ''
        Write-Host '🧾 Общее покрытие по всем модулям:'
        go tool cover -func=$total | Select-Object -Last 1 | Write-Host
        "

  coverage:html:
    desc: "Генерирует HTML-отчёт покрытия и открывает его в браузере"
    deps: [ test-coverage ]
    cmds:
      - |
        {{.PS}} "
        $output = '{{.COVERAGE_DIR}}/coverage.html'
        Write-Host '🌐 Генерируем HTML-отчёт...'
        go tool cover -html='{{.COVERAGE_DIR}}/{{.COVERAGE_FILE}}' -o $output
        Write-Host \"🚀 Открываем $output\"
        Start-Process $output
        "

  test:
    desc: "Запускает юнит-тесты для всех модулей"
    cmds:
      - |
        {{.PS}} "
        $modules = '{{.MODULES}}' -split '\s+' | Where-Object { $_ }
        $err = 0
        foreach ($mod in $modules) {
          if (Test-Path $mod) {
            Write-Host \"🧪 Тестируем модуль $mod\"
            go test -v \"./$mod/...\"
            if ($LASTEXITCODE -ne 0) { $err = 1 }
          }
        }
        exit $err
        "

  # ==========================================================================
  # DOCKER COMPOSE
  # ==========================================================================

  up-core:
    desc: Поднять core контейнеры
    dir: deploy/compose/core
    cmds:
      - cmd: echo [task] 🚀 Поднимаем core контейнеры
      - cmd: docker compose up --build --detach

  down-core:
    desc: Остановить и удалить core контейнеры
    dir: deploy/compose/core
    cmds:
      - cmd: echo [task] 🛑 Останавливаем core контейнеры
      - cmd: docker compose down --volumes

  up-inventory:
    desc: Поднять Inventory сервис и все его зависимости
    dir: deploy/compose/inventory
    cmds:
      - cmd: echo [task] 📦 Поднимаем Inventory с зависимостями
      - cmd: docker compose up --build --detach

  down-inventory:
    desc: Остановить и удалить Inventory сервис и все его зависимости
    dir: deploy/compose/inventory
    cmds:
      - cmd: echo [task] 🛑 Останавливаем Inventory с зависимостями
      - cmd: docker compose down --volumes

  up-order:
    desc: Поднять Order сервис и все его зависимости
    dir: deploy/compose/order
    cmds:
      - cmd: echo [task] 📦 Поднимаем Order с зависимостями
      - cmd: docker compose up --build --detach

  down-order:
    desc: Остановить и удалить Order сервис и все его зависимости
    dir: deploy/compose/order
    cmds:
      - cmd: echo [task] 🛑 Останавливаем Order с зависимостями
      - cmd: docker compose down --volumes

  up-all:
    desc: Поднять все сервисы по очереди вместе с зависимостями
    cmds:
      - task: up-core
      - task: up-inventory
      - task: up-order

  down-all:
    desc: Остановить и удалить все сервисы по очереди вместе с зависимостями
    cmds:
      - task: down-core
      - task: down-inventory
      - task: down-order

  # ==========================================================================
  # API ТЕСТЫ
  # ==========================================================================

  grpcurl:install:
    desc: "Устанавливает grpcurl в каталог bin"
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path '{{.BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.BIN_DIR}}' -Force | Out-Null }
        if (-not (Test-Path '{{.GRPCURL}}')) {
          Write-Host '📦 Устанавливаем grpcurl {{.GRPCURL_VERSION}}...'
          $env:GOBIN = (Resolve-Path '{{.BIN_DIR}}').Path
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@{{.GRPCURL_VERSION}}
          if ($LASTEXITCODE -ne 0) { exit 1 }
        }
        "
    status:
      - powershell -NoProfile -Command "if (Test-Path '{{.GRPCURL}}') { exit 0 } else { exit 1 }"

  test-api:
    desc: "🧪 Запуск тестов для проверки API микросервисов"
    deps: [ grpcurl:install ]
    cmds:
      - |
        {{.PS}} "
        $ErrorActionPreference = 'Stop'
        Write-Host '🧪 Тестирование API микросервисов через gRPC и REST'
        $grpcurl = '{{.GRPCURL}}'
        $baseUrl = 'http://localhost:8080/api/v1/orders'

        function Fail($msg, $resp) {
          Write-Host \"❌ $msg\"
          if ($resp) { Write-Host \"🔍 Ответ сервера: $resp\" }
          exit 1
        }

        # ----- Тест 1 -----
        Write-Host ''
        Write-Host '📦 Тест 1: Получение списка деталей из Inventory'
        $partsRaw = & $grpcurl -plaintext -d '{\"filter\":{}}' localhost:50051 inventory.v1.InventoryService/ListParts 2>&1 | Out-String
        if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($partsRaw) -or $partsRaw -match 'error') {
          Fail 'Не удалось получить список деталей.' $partsRaw
        }
        try { $partsJson = $partsRaw | ConvertFrom-Json } catch { Fail 'Невалидный JSON в ответе ListParts.' $partsRaw }
        $partUuid = $partsJson.parts[0].uuid
        if (-not $partUuid) { Fail 'Не удалось найти UUID детали в ответе.' $partsRaw }
        Write-Host \"✅ Успешно получен список деталей, первая UUID: $partUuid\"

        # ----- Тест 2 -----
        Write-Host ''
        Write-Host '🔍 Тест 2: Получение информации о детали по UUID'
        $partRaw = & $grpcurl -plaintext -d (\"{`\"uuid`\":`\"$partUuid`\"}\") localhost:50051 inventory.v1.InventoryService/GetPart 2>&1 | Out-String
        if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($partRaw) -or $partRaw -match 'error') {
          Fail 'Не удалось получить информацию о детали.' $partRaw
        }
        try { $partJson = $partRaw | ConvertFrom-Json } catch { Fail 'Невалидный JSON в ответе GetPart.' $partRaw }
        $partName = $partJson.part.name
        if (-not $partName) { $partName = $partJson.name }
        if (-not $partName) { Fail 'Не удалось извлечь имя детали из ответа.' $partRaw }
        Write-Host \"✅ Успешно получена деталь: $partName\"

        # ----- Тест 3 -----
        Write-Host ''
        Write-Host '👤 Тест 3: Создание пользователя для тестов'
        $userUuid = [guid]::NewGuid().ToString()
        Write-Host \"✅ Сгенерирован UUID пользователя: $userUuid\"

        # ----- Тест 4 -----
        Write-Host ''
        Write-Host '📝 Тест 4: Создание заказа (REST API)'
        $body = @{ user_uuid = $userUuid; part_uuids = @($partUuid) } | ConvertTo-Json -Compress
        try {
          $orderResp = Invoke-RestMethod -Uri $baseUrl -Method POST -Body $body -ContentType 'application/json'
        } catch { Fail 'Не удалось создать заказ.' $_.Exception.Message }
        $orderUuid = $orderResp.uuid
        if (-not $orderUuid) { $orderUuid = $orderResp.order_uuid }
        if (-not $orderUuid) { Fail 'Не удалось извлечь UUID заказа из ответа.' ($orderResp | ConvertTo-Json) }
        Write-Host \"✅ Успешно создан заказ с UUID: $orderUuid\"

        # ----- Тест 5 -----
        Write-Host ''
        Write-Host '📊 Тест 5: Проверка начального статуса заказа (должен быть PENDING_PAYMENT)'
        try {
          $info = Invoke-RestMethod -Uri \"$baseUrl/$orderUuid\" -Method GET
        } catch { Fail 'Не удалось получить информацию о заказе.' $_.Exception.Message }
        $status = $info.status
        if ($status -notmatch 'PENDING_PAYMENT') {
          Fail \"Неверный начальный статус заказа. Ожидался PENDING_PAYMENT, получен: $status\"
        }
        Write-Host \"✅ Начальный статус заказа корректный: $status\"

        # ----- Тест 6 -----
        Write-Host ''
        Write-Host '💰 Тест 6: Оплата заказа (REST API)'
        $payBody = @{ payment_method = 'PAYMENT_METHOD_CARD' } | ConvertTo-Json -Compress
        try {
          Invoke-RestMethod -Uri \"$baseUrl/$orderUuid/pay\" -Method POST -Body $payBody -ContentType 'application/json' | Out-Null
        } catch { Fail 'Ошибка при оплате заказа.' $_.Exception.Message }
        Write-Host '✅ Заказ успешно оплачен'

        # ----- Тест 7 -----
        Write-Host ''
        Write-Host '📊 Тест 7: Проверка статуса после оплаты (должен быть PAID)'
        $info = Invoke-RestMethod -Uri \"$baseUrl/$orderUuid\" -Method GET
        $status = $info.status
        if ($status -notmatch 'PAID' -and $status -notmatch 'ASSEMBLED') {
          Fail \"Неверный статус заказа после оплаты. Ожидался PAID или ASSEMBLED, получен: $status\"
        }
        Write-Host \"✅ Статус заказа после оплаты: $status\"

        # ----- Тест 8 -----
        Write-Host ''
        Write-Host '📝 Тест 8: Создание второго заказа для отмены (REST API)'
        $body2 = @{ user_uuid = $userUuid; part_uuids = @($partUuid) } | ConvertTo-Json -Compress
        try {
          $order2Resp = Invoke-RestMethod -Uri $baseUrl -Method POST -Body $body2 -ContentType 'application/json'
        } catch { Fail 'Не удалось создать второй заказ.' $_.Exception.Message }
        $order2Uuid = $order2Resp.uuid
        if (-not $order2Uuid) { $order2Uuid = $order2Resp.order_uuid }
        if (-not $order2Uuid) { Fail 'Не удалось извлечь UUID второго заказа из ответа.' ($order2Resp | ConvertTo-Json) }
        Write-Host \"✅ Успешно создан второй заказ с UUID: $order2Uuid\"

        $info2 = Invoke-RestMethod -Uri \"$baseUrl/$order2Uuid\" -Method GET
        $status2 = $info2.status
        if ($status2 -notmatch 'PENDING_PAYMENT') {
          Fail \"Неверный начальный статус второго заказа. Ожидался PENDING_PAYMENT, получен: $status2\"
        }
        Write-Host \"✅ Начальный статус второго заказа: $status2\"

        # ----- Тест 9 -----
        Write-Host ''
        Write-Host '❌ Тест 9: Отмена второго заказа (REST API)'
        Write-Host 'Ожидаем 2 секунды перед отменой...'
        Start-Sleep -Seconds 2
        try {
          Invoke-RestMethod -Uri \"$baseUrl/$order2Uuid/cancel\" -Method POST | Out-Null
        } catch { Fail 'Ошибка при отмене заказа.' $_.Exception.Message }

        Write-Host 'Проверяем статус после отмены...'
        $info2 = Invoke-RestMethod -Uri \"$baseUrl/$order2Uuid\" -Method GET
        $status2 = $info2.status
        if ($status2 -notmatch 'CANCELLED') {
          Fail \"Неверный статус отменённого заказа. Ожидался CANCELLED, получен: $status2\" ($info2 | ConvertTo-Json)
        }
        Write-Host \"✅ Статус второго заказа после отмены: $status2\"

        Write-Host ''
        Write-Host '🎉 Все тесты API успешно выполнены!'
        "